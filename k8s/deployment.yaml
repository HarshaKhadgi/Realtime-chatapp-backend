apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-chatapp-backend-deployment
  labels:
    app: realtime-chatapp-backend
  namespace: realtime-chatapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: realtime-chatapp-backend
  template:
    metadata:
      labels:
        app: realtime-chatapp-backend

    spec:
      containers:
        - name: realtime-chatapp-backend
          image: 023703348962.dkr.ecr.ap-south-1.amazonaws.com/realtime-chatapp-backend:147e077cdae77fb72570e5f15c2369142e5d67c4-2
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: chatapp-configmap
            