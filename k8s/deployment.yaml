apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-chatapp-backend-deployment
  labels:
    app: realtime-chatapp-backend
  namespace: realtime-chatapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: realtime-chatapp-backend
  template:
    metadata:
      labels:
        app: realtime-chatapp-backend

    spec:
      containers:
        - name: realtime-chatapp-backend
          image: 979667334110.dkr.ecr.ap-south-1.amazonaws.com/fareshare-backend:a80e66ca173f54cb9f9e2c91c6da162a40c3d9ae-3
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: chatapp-configmap
            